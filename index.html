<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gran Campeonato de Autos - V2.2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #111;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2rem;
            color: #f1c40f;
            text-shadow: 0 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            text-align: center;
        }

        /* PANTALLA DE REGISTRO */
        .pantalla-registro {
            background: #1e272e;
            padding: 25px;
            border-radius: 15px;
            border: 3px solid #f39c12;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            text-align: center;
            display: block;
        }

        .pantalla-registro h2 {
            margin-bottom: 20px;
            color: #00d2d3;
        }

        .campo-entrada {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            background: #3d3d3d;
            color: white;
            text-align: center;
        }

        .selector-autos {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .opcion-auto {
            border: 2px solid #576574;
            border-radius: 8px;
            padding: 5px;
            cursor: pointer;
            background: #2f3542;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 90px;
            overflow: hidden;
        }

        .opcion-auto img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .opcion-auto:hover { border-color: #f1c40f; }

        .opcion-auto.seleccionado {
            border-color: #2ecc71;
            background: #10ac84;
            transform: scale(1.05);
            box-shadow: 0 0 12px #2ecc71;
        }

        /* PANTALLA DE JUEGO (PISTA) */
        .pantalla-juego {
            display: none;
            width: 96vw;
            max-width: 1500px;
            flex-direction: column;
            align-items: center;
        }

        .pista-container {
            width: 100%;
            background: #222;
            border: 5px solid #444;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 12px 30px rgba(0,0,0,0.8);
        }

        .carril {
            display: flex;
            align-items: center;
            height: 75px;
            border-bottom: 3px dashed #555;
            position: relative;
            background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
        }

        .carril:last-child { border-bottom: none; }

        .linea-meta {
            position: absolute;
            right: 10%;
            top: 0;
            bottom: 0;
            width: 15px;
            background: repeating-linear-gradient(0deg, #fff, #fff 15px, #000 15px, #000 30px);
            z-index: 1;
            box-shadow: 0 0 8px black;
        }

        .auto {
            height: 55px;
            width: auto;
            position: absolute;
            left: 0%;
            transition: left 0.08s linear;
            z-index: 2;
        }

        .info-panel {
            position: absolute;
            right: 1%;
            font-weight: bold;
            font-size: 0.85rem;
            background-color: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 5px;
            color: #00ffcc;
            z-index: 3;
            border: 1px solid #00d2d3;
        }

        .controles {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }

        button:active { transform: scale(0.95); }
        .btn-principal { background-color: #2ecc71; color: white; }
        .btn-peligro { background-color: #e74c3c; color: white; }

        /* MODAL FINAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-contenido {
            background-color: #1e272e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #f1c40f;
            max-width: 450px;
            width: 90%;
        }

        .modal-contenido h2 {
            font-size: 2.2rem;
            color: #f1c40f;
            margin-bottom: 15px;
        }

        .img-ganador-modal {
            width: 160px;
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0 0 10px #f1c40f);
        }
    </style>
</head>
<body>

    <div id="pantallaRegistro" class="pantalla-registro">
        <h2>REGISTRO DE PILOTO</h2>
        <input type="text" id="inputNombre" class="campo-entrada" placeholder="Escribe tu nombre aquí..." maxlength="15">
        
        <p style="margin-bottom: 10px; font-weight: bold;">SELECCIONA TU AUTO:</p>
        <div class="selector-autos">
            <div class="opcion-auto" onclick="seleccionarAuto(0)"><img src="AUTO 1 png.png" alt="Auto 1"></div>
            <div class="opcion-auto" onclick="seleccionarAuto(1)"><img src="AUTO 2 png.png" alt="Auto 2"></div>
            <div class="opcion-auto" onclick="seleccionarAuto(2)"><img src="AUTO 3 png.png" alt="Auto 3"></div>
            <div class="opcion-auto" onclick="seleccionarAuto(3)"><img src="AUTO 4 png.png" alt="Auto 4"></div>
            <div class="opcion-auto" onclick="seleccionarAuto(4)"><img src="AUTO 5 png.png" alt="Auto 5"></div>
        </div>

        <button class="btn-principal" onclick="confirmarRegistro()">Ingresar a la Pista</button>
    </div>

    <div id="pantallaJuego" class="pantalla-juego">
        <h1>🏆 GRAN CAMPEONATO DE VELOCIDAD 🏆</h1>
        <div class="pista-container">
            <div class="linea-meta"></div>
            
            <div class="carril">
                <img src="AUTO 1 png.png" id="auto1" class="auto">
                <span id="label1" class="info-panel">NARANJA: 0 Km/h</span>
            </div>
            <div class="carril">
                <img src="AUTO 2 png.png" id="auto2" class="auto">
                <span id="label2" class="info-panel">AZUL: 0 Km/h</span>
            </div>
            <div class="carril">
                <img src="AUTO 3 png.png" id="auto3" class="auto">
                <span id="label3" class="info-panel">ROJO: 0 Km/h</span>
            </div>
            <div class="carril">
                <img src="AUTO 4 png.png" id="auto4" class="auto">
                <span id="label4" class="info-panel">VERDE: 0 Km/h</span>
            </div>
            <div class="carril">
                <img src="AUTO 5 png.png" id="auto5" class="auto">
                <span id="label5" class="info-panel">AMARILLO: 0 Km/h</span>
            </div>
        </div>

        <div class="controles">
            <button id="btnPartida" class="btn-principal" onclick="comenzarCarrera()">Partida</button>
            <button class="btn-danger" onclick="reiniciarCarrera()">Reiniciar</button>
        </div>
    </div>

    <div id="modalGanador" class="modal">
        <div class="modal-contenido">
            <h2>🏁 FIN DE LA CARRERA 🏁</h2>
            <img id="imgGanador" class="img-ganador-modal" src="" alt="Ganador">
            <p id="txtGanador" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; color: #fff;"></p>
            <button class="btn-principal" onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>

    <script>
        let loopCarrera = null;
        let juegoActivo = false;
        let autoSeleccionadoIndex = null;
        
        const musicaJuego = new Audio('TopGear.mp3');
        musicaJuego.loop = true;

        const autos = [
            { id: "auto1", label: "label1", nombre: "NARANJA", baseNombre: "NARANJA", src: "AUTO 1 png.png", posicion: 0 },
            { id: "auto2", label: "label2", nombre: "AZUL", baseNombre: "AZUL", src: "AUTO 2 png.png", posicion: 0 },
            { id: "auto3", label: "label3", nombre: "ROJO", baseNombre: "ROJO", src: "AUTO 3 png.png", posicion: 0 },
            { id: "auto4", label: "label4", nombre: "VERDE", baseNombre: "VERDE", src: "AUTO 4 png.png", posicion: 0 },
            { id: "auto5", label: "label5", nombre: "AMARILLO", baseNombre: "AMARILLO", src: "AUTO 5 png.png", posicion: 0 }
        ];

        function seleccionarAuto(index) {
            autoSeleccionadoIndex = index;
            const opciones = document.querySelectorAll('.opcion-auto');
            opciones.forEach(op => op.classList.remove('seleccionado'));
            opciones[index].classList.add('seleccionado');
        }

        function confirmarRegistro() {
            const nombre = document.getElementById('inputNombre').value.trim();
            if (nombre === "") {
                alert("Por favor, ingresa tu nombre de piloto.");
                return;
            }
            if (autoSeleccionadoIndex === null) {
                alert("Por favor, selecciona un auto de carreras.");
                return;
            }

            autos[autoSeleccionadoIndex].nombre = nombre.toUpperCase() + " (TÚ)";

            document.getElementById('pantallaRegistro').style.display = 'none';
            document.getElementById('pantallaJuego').style.display = 'flex';
            
            autos.forEach(auto => {
                document.getElementById(auto.label).innerText = auto.nombre + ": 0 Km/h";
            });
        }

        function comenzarCarrera() {
            if (juegoActivo) return;
            juegoActivo = true;

            musicaJuego.play().catch(error => console.log("Audio en espera: " + error));

            loopCarrera = setInterval(() => {
                autos.forEach(auto => {
                    let velocidadAleatoria = Math.floor(Math.random() * 4); 
                    auto.posicion += velocidadAleatoria;

                    const elementoAuto = document.getElementById(auto.id);
                    elementoAuto.style.left = auto.posicion + "%";

                    document.getElementById(auto.label).innerText = auto.nombre + ": " + (velocidadAleatoria * 45) + " Km/h";

                    if (auto.posicion >= 88 && juegoActivo) {
                        juegoActivo = false;
                        clearInterval(loopCarrera);
                        mostrarGanador(auto);
                    }
                });
            }, 80);
        }

        function reiniciarCarrera() {
            clearInterval(loopCarrera);
            juegoActivo = false;
            
            musicaJuego.pause();
            musicaJuego.currentTime = 0;
            
            // Reestablecer posiciones y nombres originales
            autos.forEach(auto => {
                auto.posicion = 0;
                auto.nombre = auto.baseNombre; 
                document.getElementById(auto.id).style.left = "0%";
                document.getElementById(auto.label).innerText = auto.nombre + ": 0 Km/h";
            });

            // Limpiar campos de selección
            autoSeleccionadoIndex = null;
            document.getElementById('inputNombre').value = "";
            const opciones = document.querySelectorAll('.opcion-auto');
            opciones.forEach(op => op.classList.remove('seleccionado'));

            cerrarModal();

            // Mudar vista al menú de inicio
            document.getElementById('pantallaJuego').style.display = 'none';
            document.getElementById('pantallaRegistro').style.display = 'block';
        }

        function mostrarGanador(objetoAuto) {
            document.getElementById("txtGanador").innerText = "¡El ganador indiscutible es: " + objetoAuto.nombre + "!";
            document.getElementById("imgGanador").src = objetoAuto.src;
            document.getElementById("modalGanador").style.display = "flex";
        }

        function cerrarModal() {
            document.getElementById("modalGanador").style.display = "none";
        }
    </script>
</body>
</html>
